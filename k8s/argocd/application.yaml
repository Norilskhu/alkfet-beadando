apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alkfet-beadando
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Norilskhu/alkfet-beadando.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: alkfet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

