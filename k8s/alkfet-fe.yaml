apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkfet-fe
  namespace: alkfet
  labels:
    app: alkfet-fe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alkfet-fe
  template:
    metadata:
      labels:
        app: alkfet-fe
    spec:
      containers:
        - name: alkfet-fe
          image: ghcr.io/norilskhu/alkfet-beadando/alkfet-fe:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: alkfet-fe
  namespace: alkfet
spec:
  selector:
    app: alkfet-fe
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alkfet-fe
  namespace: alkfet
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: alkfet.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alkfet-fe
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: alkfet-api-svc
                port:
                  number: 8080

